*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;overflow:hidden}
#root{width:100%;height:100%}

::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}

.app{display:flex;height:100vh;width:100vw;overflow:hidden}

/* Sidebar */
.sb{width:340px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;flex-shrink:0}
.sb-hdr{padding:1rem 1.25rem;border-bottom:1px solid #334155}
.sb-hdr h1{font-size:1.1rem;font-weight:700;color:#e2e8f0;margin-bottom:.15rem}
.sb-hdr .sub{font-size:.75rem;color:#64748b}
.sb-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;padding:.75rem 1.25rem;border-bottom:1px solid #334155;font-size:.75rem}
.sb-stats .s{text-align:left}
.sb-stats .n{color:#38bdf8;font-weight:700;font-size:1.05rem}
.sb-stats .l{color:#64748b;text-transform:uppercase;letter-spacing:.3px;margin-top:.1rem;font-size:.65rem}
.sb-tabs{display:flex;border-bottom:1px solid #334155}
.sb-tab{flex:1;padding:.6rem;background:transparent;color:#94a3b8;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:.82rem;font-weight:500}
.sb-tab:hover{color:#cbd5e1}
.sb-tab.on{color:#38bdf8;border-bottom-color:#38bdf8}
.sb-body{flex:1;overflow-y:auto;padding:.5rem 0}
.sb-foot{padding:.6rem 1.25rem;border-top:1px solid #334155;font-size:.68rem;color:#64748b;line-height:1.4}

/* Voyage groups */
.vg{padding:0 .5rem;margin-bottom:.5rem}
.vg-hdr{padding:.5rem .75rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-radius:3px}
.vg-hdr:hover{background:#253349}
.vg-hdr.on{background:rgba(56,189,248,.08)}
.vg-name{font-size:.85rem;font-weight:700;color:#e2e8f0;display:flex;align-items:center;gap:.5rem}
.vg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.vg-meta{font-size:.7rem;color:#64748b;margin-top:.15rem;margin-left:1.25rem}

/* Trip row */
.tr{padding:.4rem .75rem .4rem 1.75rem;cursor:pointer;border-radius:3px;display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.tr:hover{background:#253349}
.tr.on{background:rgba(56,189,248,.12)}
.tr-nm{font-size:.82rem;color:#cbd5e1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tr-nm .d{font-size:.7rem;color:#64748b;margin-right:.4rem;font-weight:400}
.tr-dist{font-size:.72rem;color:#94a3b8;flex-shrink:0}

.leaflet-container{background:#dbe8f1}

const {useState, useEffect, useRef, useMemo} = React;

// Each multi-day voyage gets its own colour on the map
const VOYAGE_COLORS = ['#38bdf8', '#fcd34d', '#f472b6', '#86efac', '#fb923c', '#a78bfa', '#22d3ee', '#fda4af'];

// Group day-trips into voyages (consecutive days, gap ≤2 nights = same voyage)
function groupVoyages(trips) {
  const sorted = [...trips].sort((a, b) => a.date.localeCompare(b.date));
  const voyages = [];
  let cur = null;
  for (const t of sorted) {
    if (!cur || daysBetween(cur.trips.at(-1).date, t.date) > 2) {
      cur = {id: `v${voyages.length + 1}`, trips: [t], color: VOYAGE_COLORS[voyages.length % VOYAGE_COLORS.length]};
      voyages.push(cur);
    } else {
      cur.trips.push(t);
    }
  }
  for (const v of voyages) {
    v.date_start = v.trips[0].date;
    v.date_end = v.trips.at(-1).date;
    v.nm = v.trips.reduce((s, t) => s + t.distance_nm, 0);
    v.sailingDays = new Set(v.trips.map(t => t.date)).size;
    v.spanDays = daysBetween(v.date_start, v.date_end) + 1;
    v.name = formatDateRange(v.date_start, v.date_end);
    v.season = seasonOf(v.date_start);
  }
  return voyages;
}

function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function formatDateRange(a, b) {
  const da = new Date(a), db = new Date(b);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (da.getUTCFullYear() !== db.getUTCFullYear() || da.getUTCMonth() !== db.getUTCMonth()) {
    return `${months[da.getUTCMonth()]} ${da.getUTCDate()} – ${months[db.getUTCMonth()]} ${db.getUTCDate()}, ${db.getUTCFullYear()}`;
  }
  if (da.getUTCDate() === db.getUTCDate()) {
    return `${months[da.getUTCMonth()]} ${da.getUTCDate()}, ${db.getUTCFullYear()}`;
  }
  return `${months[da.getUTCMonth()]} ${da.getUTCDate()}–${db.getUTCDate()}, ${db.getUTCFullYear()}`;
}
function seasonOf(dateStr) {
  const m = new Date(dateStr).getUTCMonth() + 1;
  const y = new Date(dateStr).getUTCFullYear();
  if (m >= 3 && m <= 5) return `Spring ${y}`;
  if (m >= 6 && m <= 8) return `Summer ${y}`;
  if (m >= 9 && m <= 11) return `Autumn ${y}`;
  return `Winter ${y}`;
}
function formatDuration(mins) {
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m ? `${h}h ${m}m` : `${h}h`;
}

// Best human-readable harbour name from OSM, or coordinates as fallback.
// Returns {name, approx} where approx=true means "auto-geocoded, treat with caution".
function harborLabel(h) {
  if (!h.osm) {
    return {name: `${h.lat.toFixed(3)}°N, ${h.lon.toFixed(3)}°E`, approx: true};
  }
  const a = h.osm.address || {};
  const specific = a.village || a.hamlet || a.suburb || a.town || a.city || a.neighbourhood;
  if (specific) return {name: specific, approx: false};
  const fallback = h.osm.name || a.municipality || a.county;
  if (fallback) return {name: fallback, approx: true};
  return {name: `${h.lat.toFixed(3)}°N, ${h.lon.toFixed(3)}°E`, approx: true};
}
function harborArea(h) {
  if (!h.osm) return '';
  const a = h.osm.address || {};
  return a.municipality || a.county || a.state || a.country || '';
}

    "review_count": 44,
    "reviews": [
      {
        "author": "Shirley",
        "date": "2024-10-16",
        "body": "Full of seagrass! Took us awhile to find a good spot (we hope). Anchored at 20m depth and let out 80m chain. Gusting at 18 to 20kn.",
        "rating": 2.0
      },
      {
        "author": "Christian",
        "date": "2024-10-13",
        "body": "Mouillage tr\u00e8s agr\u00e9able, par 5 m\u00e8tres dans le sable, mais il faut arriver t\u00f4t car tr\u00e8s pris\u00e9. Le bar restaurant de la plage est correct, petit ponton d\u2019accueil facile d\u2019acc\u00e8s par 1 m\u00e8tre de fond, bonne cuisine, prix correct. Nous a command\u00e9 un taxi pour visite , 100\u20ac AR \ud83d\udc4d",
        "rating": 4.0
      },
      {
        "author": "Rolf 0815",
        "date": "2024-10-06",
        "body": "Dieses Jahr 2 mal hier geankert. Vor 10 Jahren ebenso. Ankergrund hat gute Sandstellen auf ca. 4 Metern relativ nahe dem Ufer. \nDie alte Kette unweit dem Restaurant Psarotaverna Aeginitissa liegt immer noch. Vorsicht.\nAuch die Nacht von Donnerstag auf Freitag  (Charterheimkehrer) wurde es nicht zu eng. Lag wohl am geringen Nachtwind so dass viele offener Buchten als Alternative zur Verf\u00fcgung standen.",
        "rating": 5.0
      },
      {
        "author": "Alicia Y Pedro \ud83c\udde6\ud83c\uddf7 \ud83c\uddea\ud83c\uddf8 @Conocer_Navegando",
        "date": "2024-08-31",
        "body": "Fondeamos para almotzar es muy protegido",
        "rating": 5.0
      },
      {
        "author": "Eduardo",
        "date": "2024-08-20",
        "body": "We really liked it here. If it wasn\u2019t for thw wind shift we would have stayed longer. We might come back. The anchorage is spacious but we noticed that some boaters (particularly charter boats) have some difficulty to anchor here.\nWe anchor in a nice sand patch in 4-5 mts and we had 25 mts out. \nThe water is clear, good for making water.\nGood swimming, SUP and snorkel.\nThe Aeginitissa restaurant has very good food. Depending on the day, one should make reservations.\nThere are some garbage bins by the road.\nThe beach was close but surprisingly not really noisy.",
        "rating": 5.0
      }
    ],

    "reviews": [
      {
        "author": "Tiago",
        "date": "2022-08-08",
        "body": "A beautiful big bay with enough places for many boats and a seabed of sand and patches of seaweed. We came to find shelter from a 30kts N-NW wind and waves, dropped our anchor between the caves and the Apollo Hotel in 8m of fine sand and very good holding. During the afternoon some gusts came in but nothing strongly as outside. At night the swell is more noticeable and sometimes uncomfortable but never unsafe.\nMany boats had stopped during the day but very few stayed overnight.\nWe found fresh water on the pontoon, mini-market, bakery and many charming restaurants in the city. The water in the bay is crystal clear and snorkeling is good. The Aphaia Temple is worth a visit.\nWe ended up staying four days because of the strong winds and waves in the sea. Maybe not the most comfortable spot but very convenient.\n\nwww.sailtroublemaker.com",
        "rating": 3.0
      },
      {
        "author": "Dom Fuas",
        "date": "2022-07-31",
        "body": "Good for swim and shelter but lot of roling.\nGood holding on 8 m deph, easy Access by dinguy to city",
        "rating": 3.0
      },
      {
        "author": "Robert",
        "date": "2022-07-15",
        "body": "Anchoring-wise good: good depths and holding. Wind-wise alright, some gusts of meltemi do pass and come to the bay. Swell was rather aweful as has been mentioned in other comments. Still bareable. Ag. Marina has not too much to offer except for the Afaia Temple.",
        "rating": 3.0
      },
      {
        "author": "Mathilde",
        "date": "2022-07-11",
        "body": "Effectivement tr\u00e8s roulant quelque soit l'orientation du vent. Cadre tr\u00e8s sympa dans cette partie de la baie. L'ancrage est bon, 2 \u00e0 8 m\u00e8tres en fond sableux c\u00f4t\u00e9 grotte. Possibilit\u00e9 d'aller visiter le beau site arch\u00e9ologique \u00e0 30 minutes \u00e0 pied. Le jour o\u00f9 nous y \u00e9tions (dimanche soir) beaucoup de bateaux \u00e9taient au mouillage dans la journ\u00e9e mais nous \u00e9tions seulement 4 \u00e0 y dormir.",

  "20738": {
    "url": "https://www.navily.com/port/poros/20738",
    "kind": "marina",
    "slug": "poros",
    "navily_id": 20738,
    "name": "Poros",
    "rating": 3.8,
    "review_count": 171,
    "reviews": [
      {
        "author": "Gabriella",
        "date": "2022-06-11",
        "body": "2022 - La marina \u00e8 piccola, ma 20 barche ci stanno. Sul nuovo pontile si ormeggia solo all\u2019inglese (longside). Niente elettricit\u00e0, solo acqua. Ottimo aiuto all\u2019ormeggio. Per un catamarano 42ft abbiamo pagato \u20ac 27,50 a notte. \nNelle immediate vicinanze, c\u2019\u00e8 ristorante, market, bar e piccolo negozio di souvenir.\n\n03/09/2024\nPer una barca di 14 metri, ho pagato 25\u20ac a notte, acqua inclusa. Ormeggio con ancora e cime sul molo.",
        "rating": 4.0
      },
      {
        "author": "Marina",
        "date": "2024-09-02",
        "body": "We stopped just to fuel and have lunch but almost stayed for the night because of how nice it is! The welcome at the port was super friendly, the restaurant next to port was great, supermarket and atm next to it and the diesel truck was the nicest guy with his kid! Highly recommend this place and the diesel delivery!",
        "rating": 4.8
      },
      {
        "author": "Sarah",
        "date": "2024-09-02",
        "body": "Here is great, Spiros is super efficient and very welcoming.  Good that he was there to advise re the chain for the pontoon so we could avoid getting anchor snagged! \nI highly recommend Poros",
        "rating": 4.8
      },
      {
        "author": "Dave",
        "date": "2023-06-10",
        "body": "I agree with previous comment, Spiros is more than helpful and this is the second time we\u2019ve been here in two years and he remembered us. We tied up on the pontoon and he was on hand. Water is available, 15\u20ac per night for a 12m yacht. \nThe main town is a short walk away and there are plenty of restaurants to choose from.",
        "rating": 4.2
      },
      {
        "author": "Christian",
        "date": "2024-06-24",
        "body": "Accueillis avec efficacit\u00e9 par Spyros sur canal 12 ou 72, install\u00e9s sur le ponton flottant, supermarch\u00e9 bien achaland\u00e9, possibilit\u00e9 d\u2019avoir de l\u2019eau. Poros est une escale bien prot\u00e9g\u00e9e, tranquille, dans la verdure, rythm\u00e9e par les navettes du ferry. 20\u20ac la nuit, Nous sommes arriv\u00e9s en d\u00e9but d\u2019apr\u00e8s-midi, rest\u00e9s 2 nuits, apr\u00e8s 17:00 les places deviennent rares mais Spyros trouve la solution.\n\nRetour \u00e0 Poros fin ao\u00fbt pour un stop de 3 nuits. Lors de notre premier passage, nous avions zapp\u00e9 le village. Belles plages sur le trajet et surtout une boucherie, \u00e9picerie fine qui peut mettre vos morceaux de choix sous vide. Les prix au village sont plus corrects qu\u2019au supermarch\u00e9 du port. Il faut marcher un petit quart d\u2019heure.",
        "rating": 4.2
      },
      {
        "author": "Beppe",
        "date": "2024-08-29",
        "body": "Bel posto..accoglienza ottima da Spyros che ci ha riservato un posto con ormeggio all'inglese molto comodo. Paesino carino e tutto a portata di mano..acqua disponibile senza problemi o costi ...diesel disponibile,  supermercato, spiagge...\nNo elettricit\u00e0",
        "rating": 4.2
      },
      {
        "author": "Rik",
        "date": "2024-08-29",
        "body": "The Marina is as described by other boats but I want to remind people to walk 8 minutes to the main town which is really lovely. The shops at the Marina are not much but there is much more to see just a few minutes away.",
        "rating": 4.4
      },
      {
        "author": "Felix",
        "date": "2024-08-26",
        "body": "VHF not active at the moment, Spiros to be called on his cellphone +30 698 2947289. Safe port for a night, however right next to a very busy road, frequent traffic by large ferries. Constant smell of sewage. Restaurant in the proximity are at best mediocre. Water and Diesel available, no electricity. Best is to come late and leave early. Staff (especially Spiros) are exceptional.",
        "rating": 2.6
      },
      {
        "author": "Xavier",
        "date": "2024-08-22",
        "body": "\u00c9tape utile pour se prot\u00e9ger du vent N ,\nEt faire le plein d eau.\nAccueil chaleureux et efficace \u00e0 13h30 apr\u00e8s avoir t\u00e9l\u00e9phon\u00e9 au n o sur ce site.\nPrix encore raisonable en forte augmentation pour un 11m.\n25euro.\nLe tam tam parle de 30 euro plus tard cette ann\u00e9e. \nLe port \u00e9tait plein le soir et des bateaux ont \u00e9t\u00e9 refus\u00e9s. \nLe caf\u00e9 \u00e0 droite de la baie avec sa terrasse \u00e0 l arri\u00e8re est \u00e9tonnant. \nBrit de v\u00e9hicules lors du d\u00e9part et arriv\u00e9e des ferries.\n5x par jour.",
        "rating": 4.2
      },
      {
        "author": "Sailing",
        "date": "2024-08-22",
        "body": "The hospitality I experienced in Greece was unparalleled. The staff, especially the girls selling water and electricity cards, were incredibly friendly. \n\nThe owner of the Oasis Taverna Restaurant (Kythnos) goes above and beyond, personally assisting with ropes and docking maneuvers. His restaurant is excellent\u2014be sure to book a table as soon as you arrive in Poros.\n\n+48 6944061268\n\nFor laundry services, I highly recommend Mary\u2019s Laundry; they offer boat pickup at the best prices (6938 571491 / 22980 26127). \n\nIf you need diesel, you can contact +30 694 4751825.\n\nthe street in front of the restaurants and bars closes to cars from 7:30 pm to 6:30 am, so it's great for sleeping.",
        "rating": 4.4
      },
      {
        "author": "Bernd",
        "date": "2024-08-21",
        "body": "Netter Ort und kompetenter Hafenmeister!",
        "rating": 2.8
      },
      {
        "author": "Marcel",
        "date": "2024-08-21",
        "body": "Kraftstoff muss angefragt werden, kommt per LKW.",
        "rating": 3.4
      },
      {
        "author": "Tomas",
        "date": "2024-08-20",
        "body": "Muy buen servicio en locales y combustible",
        "rating": 5.0
      },
      {
        "author": "John",
        "date": "2024-08-17",
        "body": "By NW waves creates dangerous shaking inside the port. Too much hot. Too expensive of what it offers. I do not recomend but only in need\nThe only good here is Spyros.  The harbour master.",
        "rating": 2.4
      },
      {
        "author": "Blandine",
        "date": "2024-08-15",
        "body": "Nous avons \u00e9t\u00e9 accueilli par VHF uniquement par Spyros. Il nous a guid\u00e9 vers une place le long de la toute petite jet\u00e9e avec \u00e0 gauche les petits bateaux de location et \u00e0 droite une place le long pour nous. L\u2019ancre n\u2019a pas eu besoin de faire son oeuvre. Pas de besoin d\u2019eau ou d\u2019\u00e9lectricit\u00e9 donc sans souci pour nous. Des toilettes uniquement. La proximit\u00e9 du ferry et le passage des v\u00e9hicules qui vont embarquer ne nous a pas d\u00e9rang\u00e9. Il convient juste de faire tr\u00e8s attention \u00e0 la vitesse des v\u00e9hicules. Ambiance grecque avec des touristes grecques. Belle ballade le long de la plage. Villageois tr\u00e8s accueillants. Plein de commerce derri\u00e8re la plage.",
        "rating": 3.8
      },
      {
        "author": "Nicholas",
        "date": "2024-08-14",
        "body": "Great little spot. If they provided power it would be a small gem!",
        "rating": 3.8
      },
      {
        "author": "Tiziana",
        "date": "2024-08-13",
        "body": "Posto accogliente, grande Spiros lo trovavi ovunque pronto a darti una mano!! 20\u20ac a notte market vicino. Il paesino vicino a 10min",
        "rating": 4.4
      },
      {
        "author": "francesco",
        "date": "2024-08-11",
        "body": "Porto cittadino molto disturbato dai traghetti e dal traffico di camion che aspettano l'imbarco, ma se avete bisogno di fare acqua e spesa va benissimo. Supermercato fornito di fronte alla banchina. Spiros accoglie tutti molto bene e guida all'ormeggio. Spiaggia molto carina con acqua cristallina fuori dal porto in direzione nord.\nIn banchina acqua e servizi igienici (no docce)",
        "rating": 3.0
      },
      {
        "author": "Thomas",
        "date": "2024-08-10",
        "body": "Tres bien accueilli \u00e0 l\u2019arriv\u00e9e, avec des indications sur la man\u0153uvre et sur les \u00e9quipements du port! Il y a des tavernes, commerces et plages \u00e0 proximit\u00e9!\n\nSeul d\u00e9faut, les d\u00e9chargements de ferry avec 4/5 fois par jour un trafic important sur le port avec camions et voitures. Mais il suffit de quitter le bateau et aller se promener \u00e0 ce moment l\u00e0!",
        "rating": 4.8
      },
      {
        "author": "Nicola",
        "date": "2024-08-10",
        "body": "Come sempre Spiros fantastico ti indica dove andare e ti aiuta nell\u2019 ormeggio la location ha sempre il suo fascino",
        "rating": 4.0
      }
    ],

    "review_count": 34,
    "reviews": [
      {
        "author": "Matt",
        "date": "2024-06-04",
        "body": "Very busy at 6pm, failed rafting against another monohull. \n\nThen experienced DRUNK local man \u2018helping\u2019 with lines, do not listen to him, shouting to go into shallow water, when collecting our lines, he moodily gave up and threw the lines back twice. Easterly\u2019s and westerly\u2019s will make it difficult to go stern to, lots of ferry\u2019s with wake going throughout the night. No lazy lines. 12\u20ac for a night with electricity and water, 46\u201d monohull. \n\nGet here early to avoid difficult mooring.",
        "rating": 2.0
      },
      {
        "author": "Matthias und Stefanie",
        "date": "2024-04-12",
        "body": "Anfang April f\u00fcr 4 N\u00e4chte l\u00e4ngsseits. Sicher gelegen bei n\u00f6rdlichen Winden. Dieser Abschnitt ist bei CharterFlotillen beliebt (auch l\u00e4ngsseits 3er Pack) die hier ihren letzten und ersten Tag lautstark feiern( Freitag/ Sonntag - Samstag Athen), Samstag laute Discomusik bis 6am. Wenn man es ruhiger mag und Winde es zulassen besser n\u00f6rdlicher oder s\u00fcdlicher am Stadtkai.\nWenn man hier liegt, ist es schon Usus ins Oasis zu Mike zu gehen - wer die moderne griechische K\u00fcche bevorzugt, ist im Giamas oder Apagio gut beraten. \nDer PorosTrail oberhalb ist zu empfehlen.",
        "rating": 3.0
      },
      {
        "author": "Lewis",
        "date": "2023-12-28",
        "body": "I spent 5 nights alongside during December. Easy to come alongside with help from fellow sailors, however the bollards are quite far apart and difficult to use if singlehanded. Easy access to two supermarkets on the island however they have limited pre-packaged meats so i took the dingy to the larger AB in galatas. The ferries go 7.4 knots in the channel at this time of year which came cause a bit of roll, luckily i had 8 fenders, two ball fender and two spring lines. A great place in a strong northerly, it was 30 knots in the bay and only saw 5-10 alongside, luckily the chop doesn\u2019t make it to the dock.\nThere are great mountain bike trails on the island, details on trailforks and the lighthouse trail is great.",
        "rating": 4.0
      },
      {
        "author": "Bleri & Steve",
        "date": "2023-10-25",
        "body": "Fantastic quayside services even though could use more power and water towers further south.  Nice chandlers in town - Vikos, Pavlou.  Lots of traffic so be aware.",
        "rating": 5.0
      },
      {
        "author": "Michel",
        "date": "2023-10-18",
        "body": "Amarrer le long du quai face au restaurant l\u2019Oasis nous avons pass\u00e9 une tr\u00e8s belle soir\u00e9e sans trop de bruit malgr\u00e9 la proximit\u00e9 de la rue.",

      {
        "author": "MM",
        "date": "2022-08-12",
        "body": "We were here last year too and the private marina was only 10% open then. It seems that they have taken most of the business so there was good amount of room on the public quay. 3 stars due to the vicinity of shops and convenience of laundrette but other than that.. pretty basic.",

        "author": "Michel",
        "date": "2022-07-02",
        "body": "Rien \u00e0 ajouter aux commentaires pr\u00e9c\u00e9dents  Porto Heli est bien connu. \nUne pr\u00e9cision pour la livraison d\u2019eau : le camion passe tous les matins dimanche compris \u00e0 8 h 00\nPour ceux qui ont besoin de gaz le shipchandler sur le quai n\u2019en a pas mais vous en trouverez chez Trade Center Koronitis (voir photo) \u00e0 l\u2019autre extr\u00e9mit\u00e9 de la baie. Les courageux iront \u00e0 pied les autres (sans doute les plus nombreux) prendront un taxi.",
        "rating": 4.0
      },
      {
        "author": "Mario,Alexandra,\ud83d\udc15Cacau s/v Mr. Blue\ud83c\uddf5\ud83c\uddf9",
        "date": "2021-11-09",
        "body": "Nice place, no electricity, water on a truck, the lady control the payment very hard.\nNo water, no electricity, no nothing, just the kay, it shoud be cheaper or free.",
        "rating": 3.0
      },
      {
        "author": "\ud83c\udde6\ud83c\uddfa Tim",
        "date": "2021-09-04",
        "body": "From a tourist perspective there\u2019s not that much appealing about Porto Heli, the restaurants are fine, the shops are ok. Diesel and water via tanker. If there\u2019s no need to come here, why bother. But if you need a sheltered harbor to wait out storms then it\u2019s hard to beat - it\u2019s a fantastic harbor for safe mooring. So 5 stars for safe harbor, 3 for environment, that\u2019s 4 overall.\n\nNote on water and diesel:\n\nBoth are available here. For diesel, Revoil will send a truck to the pier. He seems to also do a few drive by\u2019s during the day. More during summer period. If he\u2019s not there, just go ask at Revoil station (up on the road near the AB supermarket) and they\u2019ll give you a time. \n\nFor Water: Tanker does a run starting at 9AM every day during the season (May - September) and only on Mon - Fri on the shoulder season (Oct / Apr). Not sure what happens in depth of winter!\n\nNote on payment: Port authority explained to me that they charge for a stay of more than 6 hours in a day, so \u201cI arrived at 4pm and left at 10am the next day\u201d counts as 2 days stay, not 1 overnight. Bit rude, but now you know! Lately the port authority seem to be coming by at 9AM, so if you leave before then, well it\u2019s going to be tough for them to charge you \ud83e\udd23",
        "rating": 4.0
      },
      {
        "author": "Edwin",
        "date": "2021-10-05",
        "body": "Ne acqua ne elettricit\u00e0 disponibile in banchina. Trattorie e supermercati si.\nPagato per una notte 17,00 \u20ac pi\u00f9 caro di Navplion! Super affollato di charter di tutte le nazionalit\u00e0 ! Un posto da fermarsi solo se hai qualche necessit\u00e0, altrimente ci sono delle belle rade nei dintorni !",
        "rating": 3.0
      }
    ],

        "body": "Friendly staff, good services and a short hop to town for supplies.",

      {
        "author": "Martin",
        "date": "2024-11-09",
        "body": "Eine Marina wo das Preis-Leistungsverh\u00e4ltnis passt. \nHilfsbereite Marineros.\nIch machte einen Stopp f\u00fcr mehrere Tage da ein Crewwechsel anstand und au\u00dferdem eine Reparatur am Saildrive notwendig war. \nBei der Reparatur wurde sofort geholfen doch da war der Preis \u00fcber dem Niveau. \nLG Martin",
        "rating": 3.8
      },
      {
        "author": "Laurent et V\u00e9ro",
        "date": "2024-09-18",
        "body": "Grande marina, Personnel sympa et serviable, 2 personnes \u00e0 l\u2019amarrage . Propre , agr\u00e9able . Super magasin d\u2019accastillage , Nautilus ,  tres sympa, comp\u00e9tent et bien achaland\u00e9 . Seuls b\u00e9mols pour moi : supermarch\u00e9 et restaurants sont loins, 35 min de marche ou taxi ( pas cher c\u2019est vrai , 5\u20ac)  , et puis marina assez ch\u00e8re : presque 200 \u20ac la nuit , avec le m\u00e8tre cube d\u2019eau a 5\u20ac. Mais globalement bonne escale  !",
        "rating": 3.6
      },
      {
        "author": "Annie & Grant",
        "date": "2024-09-13",
        "body": "Lovely Marina. Professional and warm welcome from marineros and office staff. Unfortunately as previously stated, do not go on a weekend as they cannot accommodate other vessels on a Friday night. They tried very hard but were unable to help us to stay longer. We had the hull scraped by divers which was very expensive but they did a good job. Marius in the technical department was extremely helpful and professional. All in all, a happy albeit short stay. The small grocery store is not brilliantly stocked with fresh produce but ok for basics. Not as friendly as the rest of the marina except for the one man \u201cGreece\u201d who was amazing and even helped me bring the supplies to the boat.",
        "rating": 3.8
      },
      {
        "author": "Stephen & Linda",
        "date": "2024-09-13",
        "body": "there is an excellent restaurant, well found marine store and laundry. try and schedule your arrival and departure outside of the weekend when charter boats are changing out. rental cars on site to access anywhere. we spent 4 days on maintenance and a road trip, very rewarding",
        "rating": 4.8
      }

    "rating": 3.3,
    "review_count": 5,
    "reviews": [
      {
        "author": "Hermann",
        "date": "2022-07-14",
        "body": "Der Hafen ist sicher. In die Innenstadt kommt man mit der Bahn direkt nach monastiraki.  Haltestelle beim Stadion ca. 10 min. Zu Fu\u00df. Um eur 1,20 kommt man damit in die Altstadt von wo aus alle Besichtigungen um die Akropolis fu\u00dfl\u00e4ufig m\u00f6glich sind. Die Marina ist dennoch nicht zu empfehlen. Grund: extrem laute freiluftdiskothek direkt neben dem Hafen. Musik bis 06.30 am Morgen. An Schlaf ist deshalb nicht zu denken. Sanit\u00e4ranlagen sehr schlecht.\nHermann",
        "rating": 2.0
      },
      {
        "author": "Ann",
        "date": "2022-05-10",
        "body": "This marina is secure, safe, quiet because no shops cafes and  restaurants. The staff on the dock can not be more helpful  . Caring and kind.  Assistance is fast and professional. The electricity and water is assisted. Safe for yr boat. Well worth a stay. U need a scooter and it's perfect..",
        "rating": 3.4
      },
      {
        "author": "Andr\u00e9",
        "date": "2020-10-23",
        "body": "Port tr\u00e8s bien situ\u00e9 pour une excursion touristique vers le centre de la ville (transports en commun tr\u00e8s proches).\r\nTr\u00e8s bien organis\u00e9 et \u00e9quip\u00e9 (il y a m\u00eame une piste pour h\u00e9licopt\u00e8re....)\r\nMais la proximit\u00e9 de l'autoroute  urbaine et l'\u00e9loignement (\u00e0 pied) des commerces sont des handicaps.\r\nNB c'est en th\u00e9orie une marina pour mega-yacht, mais parfois une petite place peut \u00eatre trouv\u00e9e pour un petit voilier....",
        "rating": 4.0
      },
      {
        "author": "familiaporelmundo",
        "date": "2019-09-29",
        "body": "They have a few (10) guest places. So if you d like a place make sure to write an email in advance. Staff is very helpful, so just ask. No shops or anything around. Walking to the supermarket takes like 20 minutes. Anything for the boat like gaz or parts they deliver, just ask the staff. Delivery of a Gas bottle 10\u20ac to your boat. We paid in september 65\u20ac/15 meters. Showers with hot water on the east side of the marina.",
        "rating": 3.0
      },
      {
        "author": "Michel",
        "date": "2018-09-29",
        "body": "Excellente protection totale. Nous nous sommes abrit\u00e9s la par un fort coup de meltem (40 nds). Tr\u00e8s bon accueil du personnel. \r\nUne seule critique \u00e0 faire : l\u2019environnement qui n\u2019est pas franchement glamour : \u00e9changeur d\u2019autoroute (mais tr\u00e8s raisonnablement bruyant), le stade olympique, le manque de commerces \u00e0 proximit\u00e9.\r\nPar contre l\u2019acc\u00e8s \u00e0 Ath\u00e8nes ou au Pir\u00e9e est tr\u00e8s facile : arr\u00eat m\u00e9tro Nea Faliro \u00e0 5 mn \u00e0 pied. \r\nPour le reste tout est parfait.",
        "rating": 4.0
      }

    "rating": 4.3,
    "review_count": 22,
    "reviews": [
      {
        "author": "frederic",
        "date": "2024-09-28",
        "body": "Nous arriv\u00e9s vers 17h. \nNous \u00e9tions 2 bateaux cul au quai. Nuit calme et tr\u00e8s bonne accroche de l\u2019ancre.  Le village est charmant. Des tavernes \u00e0 profusion   \nEndroit tr\u00e8s beau malgr\u00e9 l\u2019aust\u00e9rit\u00e9 du relief.",
        "rating": 3.0
      },
      {
        "author": "Lucilla & Andrea",
        "date": "2024-09-27",
        "body": "Siamo arrivati a Panormos con 17 nodi da NNE ed in queste condizioni l'ormeggio garantisce un buon riparo dal mare, meno dal vento.\nCi siamo ormeggiati lateralmente in testa al molo, accettando una risacca piuttosto fastidiosa ma non pericolosa.\nIn testa al molo vi \u00e8 spazio per 2 imbarcazioni, un'altra pu\u00f2 mettersi sul lato W. A fine settembre le due colonnine di luce/acqua erano disattivate (ma volendo c'\u00e8 una fontanella lungo la strada a pochi metri da l\u00ec), nessuno \u00e8 venuto a chiedere denaro.\nMolti bei ristoranti, anche se a mio parere con prezzi superiori alla norma. Un solo minimarket. Nessuna possibilit\u00e0 di noleggiare scooter o auto.\nLocation splendida.",
        "rating": 2.8
      },
      {
        "author": "Ben",
        "date": "2024-09-17",
        "body": "Wonderfully sheltered anchorage, plenty of room (beware the charted shallow rocks in the NE corner - marked with an unlit stone pillar.\n\nThere is a wonderful hike (about 3K) through Pyrgos, an ideal half-way lunch stop.   Round a corner and the rocks morph suddenly into a brilliant white village with a square of restaurants.  The trail head is accessed via the road up the side of the very small Panormos mini market, and regularly marked with white/red flashes.\n\nWe anchored in 17m on the second attempt (perhaps not the best holding for more than 20kts; there is plenty of room to anchor in shallower waters, but we arrived at dusk and prefer to maintain a generous swing radius",
        "rating": 4.4
      },
      {
        "author": "Andreas",
        "date": "2024-09-16",
        "body": "Ein sch\u00f6ner Ankerplatz und ein sch\u00f6ner kleiner Ort. Hat uns sehr gut gefallen. Auch die Wanderung nach Pygros war sch\u00f6n. Pyrgos sollte man nicht auslassen! \nDer Ankergrund h\u00e4lt sehr gut im Sand.  Man muss aber auf die kleinen Bojen, die alten Anker und Ketten achten! Siehe Foto.",
        "rating": 3.6
      },
      {
        "author": "Corinne",
        "date": "2024-06-21",
        "body": "Une nuit pass\u00e9e au quai parfaite. C'est calme, tout en \u00e9tant proche des tavernes. Typiquement grec tr\u00e8s loin de Mykonos pourtant si proche... Pour notre plus grand bonheur. Aucun probl\u00e8me avec notre tirant d'eau de 1.90m en longside. Nous serions bien rest\u00e9s plus longtemps. Pas d'eau ni \u00e9lectricit\u00e9 mi juin.",
        "rating": 3.6
      }

  "30667": {

    "kind": "anchorage",
    "slug": "sunken-city-of-epidaurus",
    "navily_id": 30667,
    "name": "Sunken City of Epidaurus",
    "lat": 37.62975696,
    "lon": 23.16056907,
    "rating": 4.7,
    "review_count": 9,
    "reviews": [
      {
        "author": "Michel",
        "date": "2022-08-05",
        "body": "Mouillage par 8 m sur du sable  d'accord avec les commentaires pr\u00e9c\u00e9dents le fond remonte tr\u00e8s vite... num\u00e9ro du taxi pour le th\u00e9\u00e2tre 6974714369   ..40 euro AR pour 4",
        "rating": 4.0
      },
      {
        "author": "Francis",
        "date": "2022-07-17",
        "body": "Tr\u00e8s bon mouillage pour aller visiter l\u2019amphith\u00e9\u00e2tre, nous avons pris Georges le taxi s\u00e9rieux et ponctuel.\nAttention de la bou\u00e9e rouge la plus au large il y a une grosse cha\u00eene qui va vers la pointe.\nNous \u00e9tions mouill\u00e9s dans 4 m\u00e8tres d\u2019eau sur du sable",
        "rating": 5.0
      },
      {
        "author": "SV Aero - Hollie & Hubert",
        "date": "2022-06-25",
        "body": "Beautiful little spot to spend an afternoon or, as we did, a few days. Anchored in 4 meters of sand directly in front of the Mouria Hotel and Restaurant (good food). It gets shallow quite fast so take caution when approaching the shoreline. \n\nThe sunken city starts about 500-700 meters to the south along the beach. We took our paddleboards over to go snorkeling. It\u2019s quite interesting. There were several boats that anchored in the bay further to the south side of the sunken city, but non of them stayed the night. \n\nThe peninsula on the north side is a good hike. You pass the ancient amphitheater on the way and get a good view of the anchorage as well as the main bay to the north. There is also a little church to visit that overlooks the anchorage.",
        "rating": 5.0
      },
      {
        "author": "Michael",
        "date": "2022-05-24",
        "body": "Guter Platz um die versunkene r\u00f6mische Villa zu besuchen. Die navionics tiefen stimmen nicht. Wir ankerten in Kiesel/Stein. Bei starkem Wind m\u00f6chte ich hier nicht sein. Derzeit im Mai viele Quallen.",
        "rating": 4.0
      },
      {

    ]).then(([ts, hs, nv]) => {
      setTrips(ts);
      setHarbors(hs);
      setNavily(nv);
    }).catch(e => setLoadErr(e.message));
  }, []);

  const voyages = useMemo(() => groupVoyages(trips), [trips]);

  // Init map once trips load
  useEffect(() => {
    if (!trips.length || mapRef.current) return;
    const map = L.map('map', {zoomControl: true, attributionControl: true}).setView([37.7, 23.7], 9);
    mapRef.current = map;

    tileLayerRef.current = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CartoDB',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    // Seamarks, lights, anchorages — overlay on top of the base map
    L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
      attribution: '© OpenSeaMap contributors',
      maxZoom: 18,
      opacity: 0.95,
    }).addTo(map);

    const all = [];
    trips.forEach(t => t.track.forEach(p => all.push(p)));
    if (all.length) map.fitBounds(L.latLngBounds(all), {padding: [40, 40]});
  }, [trips]);

  // Track polylines
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !voyages.length) return;
    Object.values(trackLayersRef.current).forEach(l => map.removeLayer(l));
    trackLayersRef.current = {};

    voyages.forEach(v => {
      v.trips.forEach(t => {
        const poly = L.polyline(t.track, {
          color: v.color,
          weight: selTrip === t.id ? 4 : 2.5,
          opacity: selVoyage && selVoyage !== v.id ? 0.2 : (selTrip && selTrip !== t.id ? 0.4 : 0.85),
        });
        poly.on('click', () => {
          setSelTrip(t.id);
          setSelVoyage(v.id);
          setSelHarbor(null);
        });
        poly.bindTooltip(`<b>${t.name}</b><br>${t.date} · ${t.distance_nm.toFixed(1)} nm`, {sticky: true});
        poly.addTo(map);
        trackLayersRef.current[t.id] = poly;
      });
    });
  }, [voyages, selTrip, selVoyage]);

  // Harbor markers
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !harbors.length) return;
    Object.values(harborMarkersRef.current).forEach(m => map.removeLayer(m));
    harborMarkersRef.current = {};

    harbors.forEach(h => {
      const realVisits = h.visits.filter(v => (v.duration_min || 0) >= 30 || !v.kind);
      const isHub = realVisits.length >= 3 || h.visits.length >= 5;
      const isSel = selHarbor === h.id;
      const size = isHub ? 14 : 10;
      const cls = 'hm-ico' + (isHub ? ' big' : '') + (isSel ? ' sel' : '');
      const ico = L.divIcon({
        className: '',
        html: `<div class="${cls}" style="width:${size}px;height:${size}px"></div>`,
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2],
      });
      const marker = L.marker([h.lat, h.lon], {icon: ico});
      const lbl = harborLabel(h);
      marker.bindTooltip(`<b>${lbl.name}${lbl.approx ? ' (approx.)' : ''}</b><br>${h.visits.length} visits`, {direction: 'top'});
      marker.on('click', () => {
        setSelHarbor(h.id);
        setSelTrip(null);
      });
      marker.addTo(map);
      harborMarkersRef.current[h.id] = marker;
    });
  }, [harbors, selHarbor, navily]);

  // Pan to selected harbour
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !selHarbor) return;
    const h = harbors.find(x => x.id === selHarbor);
    if (h) map.flyTo([h.lat, h.lon], Math.max(map.getZoom(), 12), {duration: 0.6});
  }, [selHarbor, harbors]);

  // Fit to selected trip / voyage
  useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    if (selTrip) {
      const t = trips.find(x => x.id === selTrip);
      if (t && t.track.length) map.fitBounds(L.latLngBounds(t.track), {padding: [50, 50]});
    } else if (selVoyage) {
      const v = voyages.find(x => x.id === selVoyage);
      if (v) {
        const pts = [];
        v.trips.forEach(t => t.track.forEach(p => pts.push(p)));
        if (pts.length) map.fitBounds(L.latLngBounds(pts), {padding: [50, 50]});
      }
    }
  }, [selTrip, selVoyage, trips, voyages]);

  const stats = useMemo(() => {
    const totalNm = trips.reduce((s, t) => s + t.distance_nm, 0);
    const sailingDays = new Set(trips.map(t => t.date)).size;
    const uniqueHarbors = harbors.filter(h => h.visits.some(v => (v.duration_min || 0) >= 30 || !v.kind)).length;
    return {nm: totalNm, days: sailingDays, harbors: uniqueHarbors, voyages: voyages.length};
  }, [trips, harbors, voyages]);

  const harborsSorted = useMemo(() => {
    return [...harbors].sort((a, b) => b.visits.length - a.visits.length);
  }, [harbors]);

  const selectedH = harbors.find(h => h.id === selHarbor);

  return (
    <div className="app">
      <button className="sb-toggle" onClick={() => setSbOpen(!sbOpen)}>☰</button>

      <aside className={'sb' + (sbOpen ? ' on' : '')}>
        <div className="sb-hdr">
          <h1>⛵ Saronic Gulf Sailing Log</h1>
          <div className="sub">Routes we've sailed · 2024 onwards</div>
        </div>

        <div className="sb-stats">
          <div className="s"><div className="n">{stats.voyages}</div><div className="l">Voyages</div></div>
          <div className="s"><div className="n">{stats.days}</div><div className="l">Sailing days</div></div>
          <div className="s"><div className="n">{stats.nm.toFixed(0)}</div><div className="l">Nautical mi</div></div>
          <div className="s"><div className="n">{stats.harbors}</div><div className="l">Harbours</div></div>
        </div>

        <div className="sb-tabs">
          <button className={'sb-tab' + (sbTab === 'voyages' ? ' on' : '')} onClick={() => setSbTab('voyages')}>Voyages</button>
          <button className={'sb-tab' + (sbTab === 'harbors' ? ' on' : '')} onClick={() => setSbTab('harbors')}>Harbours</button>
        </div>

        <div className="sb-body">
          {loadErr && <div style={{padding:'1rem',color:'#fca5a5',fontSize:'.8rem'}}>Couldn't load route data: {loadErr}</div>}
          {!loadErr && trips.length === 0 && <div className="empty" style={{padding:'1rem'}}>Loading routes…</div>}

          {sbTab === 'voyages' && voyages.map(v => (
            <div key={v.id} className="vg">
              <div className={'vg-hdr' + (selVoyage === v.id ? ' on' : '')} onClick={() => {
                const next = selVoyage === v.id ? null : v.id;
                setSelVoyage(next);
                setSelTrip(null);
                setSelHarbor(null);
              }}>
                <div>
                  <div className="vg-name"><span className="vg-dot" style={{background: v.color}}></span>{v.name}</div>
                  <div className="vg-meta">{v.sailingDays} sailing day{v.sailingDays !== 1 ? 's' : ''} · {v.nm.toFixed(0)} nm · {v.season}</div>
                </div>
              </div>
              {v.trips.map(t => (
                <div key={t.id} className={'tr' + (selTrip === t.id ? ' on' : '')} onClick={() => {
                  setSelTrip(t.id);
                  setSelVoyage(v.id);
                  setSelHarbor(null);
                }}>
                  <div className="tr-nm" title={t.name}>
                    <span className="d">{t.date.slice(5)}</span>{t.name.replace(/ Sailing$/,'')}
                  </div>
                  <div className="tr-dist">{t.distance_nm.toFixed(1)} nm</div>
                </div>
              ))}
            </div>
          ))}

          {sbTab === 'harbors' && (
            <>
              <div className="disclaimer">
                Harbour names are auto-resolved from coordinates via OpenStreetMap; treat as approximate.
                Tap a harbour to see when we visited and (where available) community notes.
              </div>
              <div style={{padding:'.5rem'}}>
                {harborsSorted.map(h => {
                  const lbl = harborLabel(h);
                  const realVisits = h.visits.filter(v => (v.duration_min || 0) >= 30 || !v.kind);
                  const visitCount = Math.max(realVisits.length, h.visits.length);
                  const nv = (h.navily || [])[0];
                  const rating = nv && navily[nv.id] && navily[nv.id].rating;
                  return (
                    <div key={h.id} className={'hr' + (selHarbor === h.id ? ' on' : '')} onClick={() => setSelHarbor(h.id)}>
                      <div style={{minWidth:0}}>
                        <div className="hr-nm">
                          {lbl.name}
                          {lbl.approx && <span className="hr-approx" title="Auto-geocoded — name approximate">approx.</span>}
                        </div>
                        <div className="hr-sub">{harborArea(h)}{rating ? ` · ★ ${rating.toFixed(1)}` : ''}</div>
                      </div>
                      <div className="hr-v">{visitCount}×</div>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>

        <div className="sb-foot">
          Tracks: {trips.length} GPX file{trips.length !== 1 ? 's' : ''} · Times in UTC.
        </div>
      </aside>

      <div className="map-wrap">
        <div id="map"></div>
        <div className="legend">
          <h4>Voyages</h4>
          {voyages.map(v => (
            <div key={v.id} className={'legend-row' + (selVoyage === v.id ? ' on' : '')}
                 onClick={() => { setSelVoyage(selVoyage === v.id ? null : v.id); setSelTrip(null); setSelHarbor(null); }}>
              <span className="sw" style={{background: v.color}}></span>
              <span>{v.name}</span>
            </div>
          ))}
          <div style={{marginTop:'.4rem',paddingTop:'.4rem',borderTop:'1px solid #334155'}}>
            <div className="legend-row">
              <span className="cdot" style={{background:'#fcd34d',boxShadow:'0 0 0 2px rgba(252,211,77,.5)'}}></span>
              <span>Frequent harbour</span>
            </div>
            <div className="legend-row">
              <span className="cdot" style={{background:'#38bdf8',boxShadow:'0 0 0 2px rgba(56,189,248,.4)'}}></span>
              <span>Harbour visited</span>
            </div>
          </div>
        </div>

        {selectedH && (
          <aside className="dp on">
            <HarborPanel harbor={selectedH} navily={navily} trips={trips} voyages={voyages} onClose={() => setSelHarbor(null)} />
          </aside>
        )}
      </div>
    </div>
  );
}

function HarborPanel({harbor, navily, trips, voyages, onClose}) {
  const lbl = harborLabel(harbor);
  const nvLinks = harbor.navily || [];
  const bestAnchor = nvLinks
    .map(l => ({link: l, data: navily[l.id]}))
    .filter(x => x.data)
    .sort((a, b) => (b.data.rating || 0) - (a.data.rating || 0))[0];
  const display = bestAnchor ? bestAnchor.data : (nvLinks.length ? navily[nvLinks[0].id] : null);
  const displayLink = bestAnchor ? bestAnchor.link : nvLinks[0];

  const visits = harbor.visits.filter(v => (v.duration_min || 0) >= 30 || v.kind);
  visits.sort((a, b) => (a.start || '').localeCompare(b.start || ''));

  const tripById = Object.fromEntries(trips.map(t => [t.id, t]));
  const voyageOf = tid => voyages.find(v => v.trips.some(t => t.id === tid));

  return (
    <>
      <div className="dp-hdr">
        <div style={{minWidth:0}}>
          <h2>
            {lbl.name}
            {lbl.approx && <span className="approx" title="Auto-geocoded — name approximate">approx.</span>}
          </h2>
          <div className="addr">{harborArea(harbor)}</div>
          <div className="addr" style={{marginTop:'.2rem'}}>{harbor.lat.toFixed(4)}°N, {harbor.lon.toFixed(4)}°E</div>
        </div>
        <button className="dp-close" onClick={onClose}>×</button>
      </div>
      <div className="dp-body">
        <section className="dp-section">
          <h3>Visits ({visits.length})</h3>
          {visits.length === 0 && <div className="empty">Transit waypoint — no stopover.</div>}
          {visits.map((v, i) => {
            const t = tripById[v.trip_id];
            const voy = voyageOf(v.trip_id);
            const dateStr = (v.start || '').slice(0, 10);
            const timeStr = (v.start || '').slice(11, 16);
            return (
              <div key={i} className="visit">
                <div className="vd">
                  {voy && <span className="vg-dot" style={{display:'inline-block',background:voy.color,width:8,height:8,borderRadius:'50%',marginRight:6,verticalAlign:'middle'}}></span>}
                  {dateStr} {timeStr && `· ${timeStr}`}
                </div>
                <div className="vm">
                  {v.kind === 'start' && 'Departure'}
                  {v.kind === 'end' && 'Arrival'}
                  {!v.kind && v.duration_min > 0 && `Stopped ${formatDuration(v.duration_min)}`}
                  {t && ` · ${t.name.replace(/ Sailing$/,'')}`}
                </div>
              </div>
            );
          })}
        </section>

        {display && (
          <section className="dp-section">
            <h3>
              {display.kind === 'marina' ? 'Marina' : 'Anchorage'} reference
              <span className="h3-sub">community data, not safety guidance</span>
            </h3>
            {display.image && <img className="hero" src={display.image} alt={display.name} onError={e => e.target.style.display='none'}/>}
            {typeof display.rating === 'number' && display.rating > 0 && (
              <div className="rating">
                <div className="n">{display.rating.toFixed(1)}</div>
                <div className="s">{renderStars(display.rating)}</div>
                <div className="c">({display.review_count || 0} reviews)</div>
              </div>
            )}
            {display.rank && <div className="rank">Ranked <b>#{display.rank.position}</b> in {display.rank.area}</div>}
            <div style={{fontSize:'.78rem',color:'#94a3b8',marginBottom:'.5rem'}}>{display.name}</div>

            {display.seabed && display.seabed.length > 0 && (
              <div style={{marginBottom:'.5rem'}}>
                <div style={{fontSize:'.7rem',textTransform:'uppercase',color:'#64748b',marginBottom:'.3rem'}}>Seabed</div>
                {display.seabed.map((s, i) => <span key={i} className="chip">{s}</span>)}
              </div>
            )}

            {display.mooring && display.mooring.length > 0 && (
              <div style={{marginBottom:'.5rem'}}>
                <div style={{fontSize:'.7rem',textTransform:'uppercase',color:'#64748b',marginBottom:'.3rem'}}>Mooring</div>
                {display.mooring.map((s, i) => <span key={i} className={'chip' + (s.includes('forbidden') ? ' warn' : ' ok')}>{s}</span>)}
              </div>
            )}

            {display.services && display.services.length > 0 && (
              <div style={{marginBottom:'.5rem'}}>
                <div style={{fontSize:'.7rem',textTransform:'uppercase',color:'#64748b',marginBottom:'.3rem'}}>Services</div>
                {display.services.map((s, i) => <span key={i} className="chip">{s}</span>)}
              </div>
            )}

            {display.phone && (
              <div style={{fontSize:'.78rem',color:'#cbd5e1',marginBottom:'.5rem'}}>📞 {display.phone}</div>
            )}

            <a className="nav-link" href={displayLink.url} target="_blank" rel="noopener">Open on Navily ↗</a>
            {nvLinks.length > 1 && (
              <div style={{marginTop:'.5rem',fontSize:'.72rem',color:'#64748b'}}>
                <div style={{marginBottom:'.2rem'}}>Other nearby Navily spots:</div>
                {nvLinks.filter(l => l.id !== displayLink.id).map(l => (
                  <a key={l.id} href={l.url} target="_blank" rel="noopener" style={{display:'block',color:'#93c5fd',textDecoration:'none',padding:'.15rem 0'}}>
                    {l.name} ({l.kind}) · {l.distance_km} km
                  </a>
                ))}
              </div>
            )}

            {display.reviews && display.reviews.length > 0 && (
              <div style={{marginTop:'.75rem'}}>
                <div style={{fontSize:'.7rem',textTransform:'uppercase',color:'#64748b',marginBottom:'.4rem'}}>Recent reviews</div>
                {display.reviews.slice(0, 4).map((r, i) => (
                  <div key={i} className="review">
                    <div className="ra"><b>{r.author || 'Anonymous'}</b><span>{r.rating.toFixed(1)} ★ · {r.date}</span></div>
                    {r.body && <div className="rb">{r.body.length > 300 ? r.body.slice(0, 300) + '…' : r.body}</div>}
                  </div>
                ))}
              </div>
            )}
          </section>
        )}

        {!display && (
          <section className="dp-section">
            <h3>Reference</h3>
            <div className="empty">No community data matched within 3 km of this point.</div>
            <a className="nav-link sec" href={`https://www.navily.com/map/@${harbor.lat},${harbor.lon},14z`} target="_blank" rel="noopener">Search on Navily ↗</a>
          </section>
        )}

        <section className="dp-section">
          <h3>External links</h3>
          <a className="nav-link sec" href={`https://www.openstreetmap.org/?mlat=${harbor.lat}&mlon=${harbor.lon}&zoom=15`} target="_blank" rel="noopener" style={{marginRight:'.4rem'}}>OpenStreetMap ↗</a>
          <a className="nav-link sec" href={`https://www.windy.com/?${harbor.lat},${harbor.lon},12`} target="_blank" rel="noopener">Windy ↗</a>
        </section>
      </div>
    </>
  );
}

function renderStars(rating) {
  const full = Math.floor(rating);
  const half = rating - full >= 0.5;
  let s = '';
  for (let i = 0; i < full; i++) s += '★';
  if (half) s += '⯨';
  for (let i = 0; i < 5 - full - (half ? 1 : 0); i++) s += '☆';
  return s;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
