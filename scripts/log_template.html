<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sailing Log — Greek Islands</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;overflow:hidden}
#root{width:100%;height:100%}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}

.app{display:flex;height:100vh;width:100vw;overflow:hidden}

/* Sidebar */
.sb{width:320px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;flex-shrink:0}
.sb-hdr{padding:1rem 1.25rem;border-bottom:1px solid #334155}
.sb-hdr h1{font-size:1.1rem;font-weight:700;color:#e2e8f0;margin-bottom:.15rem}
.sb-hdr .sub{font-size:.75rem;color:#64748b}
.sb-stats{display:flex;gap:1rem;padding:.75rem 1.25rem;border-bottom:1px solid #334155;font-size:.75rem}
.sb-stats .s{flex:1}
.sb-stats .n{color:#38bdf8;font-weight:700;font-size:1.05rem}
.sb-stats .l{color:#64748b;text-transform:uppercase;letter-spacing:.3px;margin-top:.1rem}
.sb-tabs{display:flex;border-bottom:1px solid #334155}
.sb-tab{flex:1;padding:.6rem;background:transparent;color:#94a3b8;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:.82rem;font-weight:500}
.sb-tab:hover{color:#cbd5e1}
.sb-tab.on{color:#38bdf8;border-bottom-color:#38bdf8}
.sb-body{flex:1;overflow-y:auto;padding:.5rem 0}

/* Voyage groups */
.vg{padding:0 .5rem;margin-bottom:.5rem}
.vg-hdr{padding:.5rem .75rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-radius:3px}
.vg-hdr:hover{background:#253349}
.vg-name{font-size:.85rem;font-weight:700;color:#e2e8f0;display:flex;align-items:center;gap:.5rem}
.vg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.vg-meta{font-size:.7rem;color:#64748b}

/* Trip row */
.tr{padding:.4rem .75rem .4rem 1.75rem;cursor:pointer;border-radius:3px;display:flex;justify-content:space-between;align-items:center}
.tr:hover{background:#253349}
.tr.on{background:rgba(56,189,248,.12)}
.tr-nm{font-size:.82rem;color:#cbd5e1;font-weight:500}
.tr-nm .d{font-size:.7rem;color:#64748b;margin-right:.4rem;font-weight:400}
.tr-dist{font-size:.72rem;color:#94a3b8}

/* Harbor row */
.hr{padding:.5rem .75rem;cursor:pointer;border-radius:3px;display:flex;justify-content:space-between;align-items:center;margin-bottom:.15rem}
.hr:hover{background:#253349}
.hr.on{background:rgba(56,189,248,.12)}
.hr-nm{font-size:.83rem;color:#e2e8f0;font-weight:500}
.hr-sub{font-size:.7rem;color:#64748b;margin-top:.1rem}
.hr-v{background:rgba(56,189,248,.15);color:#93c5fd;padding:.1rem .4rem;border-radius:2px;font-size:.68rem;font-weight:700;white-space:nowrap}

/* Map */
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%;background:#0f172a}
.leaflet-container{background:#0a1423}
.leaflet-popup-content-wrapper{background:#1e293b;color:#e2e8f0;border-radius:3px;box-shadow:0 4px 12px rgba(0,0,0,.5)}
.leaflet-popup-content{margin:.6rem .8rem;font-size:.8rem}
.leaflet-popup-tip{background:#1e293b}
.leaflet-control-zoom a{background:#1e293b;color:#e2e8f0;border:1px solid #334155}
.leaflet-control-zoom a:hover{background:#334155}
.leaflet-control-attribution{background:rgba(15,23,42,.8)!important;color:#64748b!important;font-size:.65rem!important}
.leaflet-control-attribution a{color:#94a3b8!important}

/* Detail panel */
.dp{position:absolute;top:0;right:0;width:420px;height:100%;background:#1e293b;border-left:1px solid #334155;display:flex;flex-direction:column;box-shadow:-4px 0 12px rgba(0,0,0,.3);z-index:1000;transform:translateX(100%);transition:transform .2s ease}
.dp.on{transform:translateX(0)}
.dp-hdr{padding:1rem 1.25rem;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem}
.dp-hdr h2{font-size:1.05rem;font-weight:700;color:#e2e8f0;margin-bottom:.2rem;line-height:1.25}
.dp-hdr .addr{font-size:.72rem;color:#94a3b8;line-height:1.4}
.dp-close{background:transparent;border:none;color:#94a3b8;cursor:pointer;font-size:1.4rem;line-height:1;padding:0 .2rem}
.dp-close:hover{color:#e2e8f0}
.dp-body{flex:1;overflow-y:auto;padding:1rem 1.25rem}
.dp-section{margin-bottom:1.25rem}
.dp-section h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;color:#64748b;font-weight:700;margin-bottom:.5rem}

.chip{display:inline-block;background:#334155;color:#cbd5e1;padding:.2rem .55rem;border-radius:2px;font-size:.72rem;margin:0 .25rem .25rem 0}
.chip.ok{background:rgba(34,197,94,.15);color:#86efac}
.chip.warn{background:rgba(245,158,11,.15);color:#fcd34d}

.visit{padding:.5rem .65rem;background:#0f172a;border:1px solid #334155;border-radius:3px;margin-bottom:.4rem;font-size:.78rem}
.visit .vd{color:#38bdf8;font-weight:600;margin-bottom:.15rem}
.visit .vm{color:#94a3b8;font-size:.72rem}

.rating{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.4rem}
.rating .n{font-size:1.6rem;font-weight:700;color:#fcd34d}
.rating .s{display:flex;color:#fcd34d;font-size:.95rem;letter-spacing:.1rem}
.rating .c{font-size:.75rem;color:#94a3b8}
.rank{font-size:.75rem;color:#94a3b8;margin-bottom:.6rem}
.rank b{color:#e2e8f0}

.review{background:#0f172a;border-left:2px solid #334155;padding:.5rem .7rem;margin-bottom:.5rem;font-size:.78rem;line-height:1.4}
.review .ra{display:flex;justify-content:space-between;font-size:.72rem;color:#94a3b8;margin-bottom:.2rem}
.review .ra b{color:#cbd5e1}
.review .rb{color:#cbd5e1}

.nav-link{display:inline-block;background:#38bdf8;color:#0f172a;padding:.35rem .75rem;border-radius:2px;font-size:.75rem;font-weight:600;text-decoration:none;margin-top:.3rem}
.nav-link:hover{background:#0ea5e9}
.nav-link.sec{background:#334155;color:#cbd5e1}
.nav-link.sec:hover{background:#475569}

.hero{width:100%;height:180px;object-fit:cover;border-radius:3px;margin-bottom:.75rem;background:#0f172a}
.empty{font-size:.8rem;color:#64748b;font-style:italic;padding:.4rem 0}

/* Legend */
.legend{position:absolute;bottom:20px;left:20px;background:rgba(30,41,59,.95);border:1px solid #334155;border-radius:3px;padding:.6rem .8rem;font-size:.72rem;z-index:500;min-width:180px}
.legend h4{font-size:.68rem;text-transform:uppercase;letter-spacing:.4px;color:#64748b;margin-bottom:.4rem}
.legend-row{display:flex;align-items:center;gap:.5rem;padding:.18rem 0;color:#cbd5e1}
.legend-row .sw{width:22px;height:3px;border-radius:1px}
.legend-row .cdot{width:8px;height:8px;border-radius:50%}

/* Harbor marker */
.hm-ico{background:#38bdf8;border:2px solid #0f172a;border-radius:50%;box-shadow:0 0 0 2px rgba(56,189,248,.4);transition:all .15s}
.hm-ico.big{background:#fcd34d;box-shadow:0 0 0 3px rgba(252,211,77,.5)}
.hm-ico.sel{background:#f43f5e;transform:scale(1.3);box-shadow:0 0 0 3px rgba(244,63,94,.6)}

.sb-toggle{display:none}

@media (max-width:768px){
  .sb{position:absolute;z-index:1500;transform:translateX(-100%);transition:transform .2s;width:300px;height:100%}
  .sb.on{transform:translateX(0)}
  .sb-toggle{display:block;position:absolute;top:12px;left:12px;z-index:1400;background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .6rem;border-radius:3px;cursor:pointer;font-size:1rem}
  .dp{width:100%}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState, useEffect, useRef, useMemo} = React;

// Voyage colors — each multi-day trip gets one color
const VOYAGE_COLORS = ['#38bdf8', '#fcd34d', '#f472b6', '#86efac', '#fb923c', '#a78bfa'];

// Group trips into voyages (consecutive days = same voyage)
function groupVoyages(trips) {
  const sorted = [...trips].sort((a, b) => a.date.localeCompare(b.date));
  const voyages = [];
  let cur = null;
  for (const t of sorted) {
    if (!cur || daysBetween(cur.trips.at(-1).date, t.date) > 2) {
      cur = {id: `v${voyages.length + 1}`, trips: [t], color: VOYAGE_COLORS[voyages.length % VOYAGE_COLORS.length]};
      voyages.push(cur);
    } else {
      cur.trips.push(t);
    }
  }
  for (const v of voyages) {
    v.date_start = v.trips[0].date;
    v.date_end = v.trips.at(-1).date;
    v.nm = v.trips.reduce((s, t) => s + t.distance_nm, 0);
    v.days = v.trips.length;
    v.name = `${formatDateRange(v.date_start, v.date_end)}`;
    v.season = seasonOf(v.date_start);
  }
  return voyages;
}

function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / (86400000));
}
function formatDateRange(a, b) {
  const da = new Date(a), db = new Date(b);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (da.getUTCFullYear() !== db.getUTCFullYear() || da.getUTCMonth() !== db.getUTCMonth()) {
    return `${months[da.getUTCMonth()]} ${da.getUTCDate()} – ${months[db.getUTCMonth()]} ${db.getUTCDate()}, ${db.getUTCFullYear()}`;
  }
  return `${months[da.getUTCMonth()]} ${da.getUTCDate()}–${db.getUTCDate()}, ${db.getUTCFullYear()}`;
}
function seasonOf(dateStr) {
  const m = new Date(dateStr).getUTCMonth() + 1;
  const y = new Date(dateStr).getUTCFullYear();
  if (m >= 3 && m <= 5) return `Spring ${y}`;
  if (m >= 6 && m <= 8) return `Summer ${y}`;
  if (m >= 9 && m <= 11) return `Autumn ${y}`;
  return `Winter ${y}`;
}
function formatDuration(mins) {
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m ? `${h}h ${m}m` : `${h}h`;
}
function harborName(h) {
  if (!h.osm) return `${h.lat.toFixed(3)}, ${h.lon.toFixed(3)}`;
  const a = h.osm.address || {};
  // Prefer most specific name: village > suburb > town > municipality
  return a.village || a.hamlet || a.suburb || a.town || a.city || a.neighbourhood || h.osm.name || 'Unknown';
}
function harborArea(h) {
  if (!h.osm) return '';
  const a = h.osm.address || {};
  return a.municipality || a.county || a.state || a.country || '';
}

function App() {
  const [trips, setTrips] = useState([]);
  const [harbors, setHarbors] = useState([]);
  const [navily, setNavily] = useState({});
  const [selVoyage, setSelVoyage] = useState(null);
  const [selTrip, setSelTrip] = useState(null);
  const [selHarbor, setSelHarbor] = useState(null);
  const [sbTab, setSbTab] = useState('voyages');
  const [sbOpen, setSbOpen] = useState(false);
  const [loadErr, setLoadErr] = useState(null);
  const mapRef = useRef(null);
  const tileLayerRef = useRef(null);
  const trackLayersRef = useRef({}); // trip_id → polyline
  const harborMarkersRef = useRef({}); // harbor_id → marker

  useEffect(() => {
    Promise.all([
      fetch('data/trips.json').then(r => r.json()),
      fetch('data/harbors.json').then(r => r.json()),
      fetch('data/navily.json').then(r => r.ok ? r.json() : {}).catch(() => ({})),
    ]).then(([ts, hs, nv]) => {
      setTrips(ts);
      setHarbors(hs);
      setNavily(nv);
    }).catch(e => setLoadErr(e.message));
  }, []);

  const voyages = useMemo(() => groupVoyages(trips), [trips]);

  // Init map once trips load
  useEffect(() => {
    if (!trips.length || mapRef.current) return;
    const map = L.map('map', {
      zoomControl: true,
      attributionControl: true,
    }).setView([37.7, 23.7], 9);
    mapRef.current = map;

    tileLayerRef.current = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CartoDB',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    // Fit bounds to all tracks
    const all = [];
    trips.forEach(t => t.track.forEach(p => all.push(p)));
    if (all.length) {
      map.fitBounds(L.latLngBounds(all), {padding: [40, 40]});
    }
  }, [trips]);

  // Render track polylines
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !voyages.length) return;

    // Remove existing
    Object.values(trackLayersRef.current).forEach(l => map.removeLayer(l));
    trackLayersRef.current = {};

    voyages.forEach(v => {
      v.trips.forEach(t => {
        const poly = L.polyline(t.track, {
          color: v.color,
          weight: selTrip === t.id ? 4 : 2.5,
          opacity: selVoyage && selVoyage !== v.id ? 0.2 : (selTrip && selTrip !== t.id ? 0.4 : 0.85),
        });
        poly.on('click', () => {
          setSelTrip(t.id);
          setSelVoyage(v.id);
          setSelHarbor(null);
        });
        poly.bindTooltip(`<b>${t.name}</b><br>${t.date} · ${t.distance_nm.toFixed(1)} nm`, {sticky: true, className: 'trk-tip'});
        poly.addTo(map);
        trackLayersRef.current[t.id] = poly;
      });
    });
  }, [voyages, selTrip, selVoyage]);

  // Render harbor markers
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !harbors.length) return;

    Object.values(harborMarkersRef.current).forEach(m => map.removeLayer(m));
    harborMarkersRef.current = {};

    harbors.forEach(h => {
      const realVisits = h.visits.filter(v => (v.duration_min || 0) >= 30 || !v.kind);
      const isHub = realVisits.length >= 3 || h.visits.length >= 5;
      const isSel = selHarbor === h.id;
      const size = isHub ? 14 : 10;
      const cls = 'hm-ico' + (isHub ? ' big' : '') + (isSel ? ' sel' : '');
      const ico = L.divIcon({
        className: '',
        html: `<div class="${cls}" style="width:${size}px;height:${size}px"></div>`,
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2],
      });
      const marker = L.marker([h.lat, h.lon], {icon: ico});
      marker.bindTooltip(`<b>${harborName(h)}</b><br>${h.visits.length} visits`, {direction: 'top'});
      marker.on('click', () => {
        setSelHarbor(h.id);
        setSelTrip(null);
      });
      marker.addTo(map);
      harborMarkersRef.current[h.id] = marker;
    });
  }, [harbors, selHarbor, navily]);

  // Pan to selected harbor
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !selHarbor) return;
    const h = harbors.find(x => x.id === selHarbor);
    if (h) map.flyTo([h.lat, h.lon], Math.max(map.getZoom(), 12), {duration: 0.6});
  }, [selHarbor, harbors]);

  // Pan to selected trip
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !selTrip) return;
    const t = trips.find(x => x.id === selTrip);
    if (t && t.track.length) {
      map.fitBounds(L.latLngBounds(t.track), {padding: [50, 50]});
    }
  }, [selTrip, trips]);

  const stats = useMemo(() => {
    const totalNm = trips.reduce((s, t) => s + t.distance_nm, 0);
    const totalDays = trips.length;
    const uniqueHarbors = harbors.filter(h => h.visits.some(v => (v.duration_min || 0) >= 30 || !v.kind)).length;
    return {nm: totalNm, days: totalDays, harbors: uniqueHarbors, voyages: voyages.length};
  }, [trips, harbors, voyages]);

  const harborsSorted = useMemo(() => {
    return [...harbors].sort((a, b) => b.visits.length - a.visits.length);
  }, [harbors]);

  const selectedH = harbors.find(h => h.id === selHarbor);

  return (
    <div className="app">
      <button className="sb-toggle" onClick={() => setSbOpen(!sbOpen)}>☰</button>

      <aside className={'sb' + (sbOpen ? ' on' : '')}>
        <div className="sb-hdr">
          <h1>⛵ Sailing Log</h1>
          <div className="sub">Greek waters · 2024–2025</div>
        </div>

        <div className="sb-stats">
          <div className="s"><div className="n">{stats.voyages}</div><div className="l">Voyages</div></div>
          <div className="s"><div className="n">{stats.days}</div><div className="l">Days</div></div>
          <div className="s"><div className="n">{stats.nm.toFixed(0)}</div><div className="l">NM</div></div>
          <div className="s"><div className="n">{stats.harbors}</div><div className="l">Ports</div></div>
        </div>

        <div className="sb-tabs">
          <button className={'sb-tab' + (sbTab === 'voyages' ? ' on' : '')} onClick={() => setSbTab('voyages')}>Voyages</button>
          <button className={'sb-tab' + (sbTab === 'harbors' ? ' on' : '')} onClick={() => setSbTab('harbors')}>Ports</button>
        </div>

        <div className="sb-body">
          {loadErr && <div style={{padding:'1rem',color:'#fca5a5',fontSize:'.8rem'}}>Load error: {loadErr}</div>}

          {sbTab === 'voyages' && voyages.map(v => (
            <div key={v.id} className="vg">
              <div className="vg-hdr" onClick={() => { setSelVoyage(selVoyage === v.id ? null : v.id); setSelTrip(null); setSelHarbor(null); }}>
                <div>
                  <div className="vg-name"><span className="vg-dot" style={{background: v.color}}></span>{v.name}</div>
                  <div className="vg-meta">{v.days} days · {v.nm.toFixed(1)} nm · {v.season}</div>
                </div>
              </div>
              {v.trips.map(t => (
                <div key={t.id} className={'tr' + (selTrip === t.id ? ' on' : '')} onClick={() => { setSelTrip(t.id); setSelVoyage(v.id); setSelHarbor(null); }}>
                  <div className="tr-nm"><span className="d">{t.date.slice(5)}</span>{t.name.replace(/ Sailing$/,'')}</div>
                  <div className="tr-dist">{t.distance_nm.toFixed(1)} nm</div>
                </div>
              ))}
            </div>
          ))}

          {sbTab === 'harbors' && (
            <div style={{padding:'.5rem'}}>
              {harborsSorted.map(h => {
                const realVisits = h.visits.filter(v => (v.duration_min || 0) >= 30 || !v.kind);
                const visitCount = Math.max(realVisits.length, h.visits.filter(v => !v.kind).length || h.visits.length);
                const nv = (h.navily || [])[0];
                return (
                  <div key={h.id} className={'hr' + (selHarbor === h.id ? ' on' : '')} onClick={() => setSelHarbor(h.id)}>
                    <div>
                      <div className="hr-nm">{harborName(h)}</div>
                      <div className="hr-sub">{harborArea(h)}{nv && ` · ★ ${navily[nv.id]?.rating?.toFixed(1) || '?'}`}</div>
                    </div>
                    <div className="hr-v">{h.visits.length}×</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </aside>

      <div className="map-wrap">
        <div id="map"></div>
        <div className="legend">
          <h4>Voyages</h4>
          {voyages.map(v => (
            <div key={v.id} className="legend-row">
              <span className="sw" style={{background: v.color}}></span>
              <span>{v.name}</span>
            </div>
          ))}
          <div className="legend-row" style={{marginTop:'.4rem',paddingTop:'.4rem',borderTop:'1px solid #334155'}}>
            <span className="cdot" style={{background:'#fcd34d',boxShadow:'0 0 0 2px rgba(252,211,77,.5)'}}></span>
            <span>Frequent port</span>
          </div>
          <div className="legend-row">
            <span className="cdot" style={{background:'#38bdf8',boxShadow:'0 0 0 2px rgba(56,189,248,.4)'}}></span>
            <span>Port visited</span>
          </div>
        </div>

        {selectedH && (
          <aside className="dp on">
            <div className="dp-hdr">
              <div>
                <h2>{harborName(selectedH)}</h2>
                <div className="addr">{harborArea(selectedH)}</div>
                <div className="addr" style={{marginTop:'.2rem'}}>{selectedH.lat.toFixed(4)}°N, {selectedH.lon.toFixed(4)}°E</div>
              </div>
              <button className="dp-close" onClick={() => setSelHarbor(null)}>×</button>
            </div>
            <div className="dp-body">
              <HarborDetail harbor={selectedH} navily={navily} trips={trips} voyages={voyages} />
            </div>
          </aside>
        )}
      </div>
    </div>
  );
}

function HarborDetail({harbor, navily, trips, voyages}) {
  const nvLinks = harbor.navily || [];
  const primary = nvLinks.length ? navily[nvLinks[0].id] : null;
  // Pick best anchor by rating if multiple
  const bestAnchor = nvLinks
    .map(l => ({link: l, data: navily[l.id]}))
    .filter(x => x.data)
    .sort((a, b) => (b.data.rating || 0) - (a.data.rating || 0))[0];
  const display = bestAnchor ? bestAnchor.data : primary;
  const displayLink = bestAnchor ? bestAnchor.link : nvLinks[0];

  // Real visits (duration > 30min or non-transit)
  const visits = harbor.visits.filter(v => (v.duration_min || 0) >= 30 || v.kind);
  visits.sort((a, b) => (a.start || '').localeCompare(b.start || ''));

  const tripById = Object.fromEntries(trips.map(t => [t.id, t]));
  const voyageOf = tid => voyages.find(v => v.trips.some(t => t.id === tid));

  return (
    <>
      <section className="dp-section">
        <h3>Visits ({visits.length})</h3>
        {visits.length === 0 && <div className="empty">Transit waypoint — no stopover.</div>}
        {visits.map((v, i) => {
          const t = tripById[v.trip_id];
          const voy = voyageOf(v.trip_id);
          const dateStr = (v.start || '').slice(0, 10);
          const timeStr = (v.start || '').slice(11, 16);
          return (
            <div key={i} className="visit">
              <div className="vd">
                {voy && <span className="vg-dot" style={{display:'inline-block',background:voy.color,width:8,height:8,borderRadius:'50%',marginRight:6,verticalAlign:'middle'}}></span>}
                {dateStr} {timeStr && `· ${timeStr}`}
              </div>
              <div className="vm">
                {v.kind === 'start' && 'Departure'}
                {v.kind === 'end' && 'Arrival'}
                {!v.kind && v.duration_min > 0 && `Stopped ${formatDuration(v.duration_min)}`}
                {t && ` · ${t.name.replace(/ Sailing$/,'')}`}
              </div>
            </div>
          );
        })}
      </section>

      {display && (
        <section className="dp-section">
          <h3>Navily · {display.kind === 'marina' ? 'Marina' : 'Anchorage'}</h3>
          {display.image && <img className="hero" src={display.image} alt={display.name} onError={e => e.target.style.display='none'}/>}
          {typeof display.rating === 'number' && display.rating > 0 && (
            <div className="rating">
              <div className="n">{display.rating.toFixed(1)}</div>
              <div className="s">{renderStars(display.rating)}</div>
              <div className="c">({display.review_count || 0} reviews)</div>
            </div>
          )}
          {display.rank && <div className="rank">Ranked <b>#{display.rank.position}</b> in {display.rank.area}</div>}
          <div style={{fontSize:'.78rem',color:'#94a3b8',marginBottom:'.5rem'}}>{display.name}</div>

          {display.seabed && display.seabed.length > 0 && (
            <div style={{marginBottom:'.5rem'}}>
              <div style={{fontSize:'.7rem',textTransform:'uppercase',color:'#64748b',marginBottom:'.3rem'}}>Seabed</div>
              {display.seabed.map((s, i) => <span key={i} className="chip">{s}</span>)}
            </div>
          )}

          {display.mooring && display.mooring.length > 0 && (
            <div style={{marginBottom:'.5rem'}}>
              <div style={{fontSize:'.7rem',textTransform:'uppercase',color:'#64748b',marginBottom:'.3rem'}}>Mooring</div>
              {display.mooring.map((s, i) => <span key={i} className={'chip' + (s.includes('forbidden') ? ' warn' : ' ok')}>{s}</span>)}
            </div>
          )}

          {display.services && display.services.length > 0 && (
            <div style={{marginBottom:'.5rem'}}>
              <div style={{fontSize:'.7rem',textTransform:'uppercase',color:'#64748b',marginBottom:'.3rem'}}>Services</div>
              {display.services.map((s, i) => <span key={i} className="chip">{s}</span>)}
            </div>
          )}

          {display.phone && (
            <div style={{fontSize:'.78rem',color:'#cbd5e1',marginBottom:'.5rem'}}>📞 {display.phone}</div>
          )}

          <a className="nav-link" href={displayLink.url} target="_blank" rel="noopener">Open on Navily ↗</a>
          {nvLinks.length > 1 && (
            <div style={{marginTop:'.5rem',fontSize:'.72rem',color:'#64748b'}}>
              <div style={{marginBottom:'.2rem'}}>Other nearby Navily spots:</div>
              {nvLinks.filter(l => l.id !== displayLink.id).map(l => (
                <a key={l.id} href={l.url} target="_blank" rel="noopener" style={{display:'block',color:'#93c5fd',textDecoration:'none',padding:'.15rem 0'}}>
                  {l.name} ({l.kind}) · {l.distance_km} km
                </a>
              ))}
            </div>
          )}

          {display.reviews && display.reviews.length > 0 && (
            <div style={{marginTop:'.75rem'}}>
              <div style={{fontSize:'.7rem',textTransform:'uppercase',color:'#64748b',marginBottom:'.4rem'}}>Recent reviews</div>
              {display.reviews.slice(0, 4).map((r, i) => (
                <div key={i} className="review">
                  <div className="ra"><b>{r.author || 'Anonymous'}</b><span>{r.rating.toFixed(1)} ★ · {r.date}</span></div>
                  {r.body && <div className="rb">{r.body.length > 300 ? r.body.slice(0, 300) + '…' : r.body}</div>}
                </div>
              ))}
            </div>
          )}
        </section>
      )}

      {!display && (
        <section className="dp-section">
          <h3>Navily</h3>
          <div className="empty">No Navily entry matched within 3 km of this point.</div>
          <a className="nav-link sec" href={`https://www.navily.com/map/@${harbor.lat},${harbor.lon},14z`} target="_blank" rel="noopener">Search on Navily ↗</a>
        </section>
      )}

      <section className="dp-section">
        <h3>External</h3>
        <a className="nav-link sec" href={`https://www.openstreetmap.org/?mlat=${harbor.lat}&mlon=${harbor.lon}&zoom=15`} target="_blank" rel="noopener" style={{marginRight:'.4rem'}}>OpenStreetMap ↗</a>
        <a className="nav-link sec" href={`https://www.windy.com/?${harbor.lat},${harbor.lon},12`} target="_blank" rel="noopener">Windy ↗</a>
      </section>
    </>
  );
}

function renderStars(rating) {
  const full = Math.floor(rating);
  const half = rating - full >= 0.5;
  let s = '';
  for (let i = 0; i < full; i++) s += '★';
  if (half) s += '⯨';
  for (let i = 0; i < 5 - full - (half ? 1 : 0); i++) s += '☆';
  return s;
}

// Assign stable harbor.id for keys (fallback)
function patchHarbors(hs) {
  return hs.map((h, i) => ({...h, id: h.id || `h${i+1}`}));
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
